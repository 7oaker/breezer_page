<div
  id="lang-switcher"
  class="inline-flex items-center rounded-lg border border-stroke p-1 dark:border-stroke-dark"
  role="group"
  aria-label="Language"
>
  <a
    href="/"
    hreflang="en"
    data-set-lang="en"
    data-lang="en"
    class="lang-switcher-btn rounded-md px-2.5 py-1.5 text-xs font-semibold leading-none text-body transition-colors hover:text-primary dark:text-white/70 dark:hover:text-primary"
  >
    EN
  </a>
  <a
    href="/de/"
    hreflang="de-AT"
    data-set-lang="de"
    data-lang="de"
    class="lang-switcher-btn rounded-md px-2.5 py-1.5 text-xs font-semibold leading-none text-body transition-colors hover:text-primary dark:text-white/70 dark:hover:text-primary"
  >
    DE
  </a>
</div>
